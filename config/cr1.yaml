# CR-1 (核心路由器) 部署配置
# 接口: 管理口(ens34) + 核心口(ens37.10, VLAN 10) + 接入口(ens37.20, VLAN 20)
role: cr
name: CR-1

rid: [10001, 36191]           # CR-1 自己的 RID

interfaces:
  - name: ens34               # 管理口 — 交换机#1 VLAN1
    mac: "00:18:54:fd:29:01"
    type: ROUTE
  - name: ens37.10            # 核心口 — 交换机#2 VLAN10 (核心面)
    mac: "00:0c:ab:1e:76:8a"
    type: ROUTE
  - name: ens37.20            # 接入口 — 交换机#2 VLAN20 (接入面1)
    mac: "00:0c:ab:1e:76:8b"
    type: ACCESS

# RID 空间表 (Table 2)
rid_spaces:
  - { id: 0,   x: 10028, y: 36181, x_mask: 20, y_mask: 20, policy: MANAGEMENT }
  - { id: 100, x: 12345, y: 34267, x_mask: 20, y_mask: 24, policy: DEFAULT }

# 路由空间邻居 (Table 3, 核心侧)
route_neighbors:
  - { space_id: 0,   rid: [10028, 36181], mac: "00:1a:2b:3c:4d:01", interface: 0 }   # CS
  - { space_id: 100, rid: [12360, 34280], mac: "00:0c:ab:1e:76:8c", interface: 1 }   # CR-2 核心口

# 接入空间邻居 (Table 4)
access_neighbors:
  - { aid: "8d969eef6ecad3c29a3a629280e686cf", mac: "00:04:ab:1f:40:a6", interface: 2 }   # AP-1
  - { aid: "d3c29a3a629280e686cf8d969eef6eca", mac: "00:1a:2b:3c:4d:02", interface: 2 }   # TS
  - { aid: "cad3c29a3a629280e686cf8d969eef6e", mac: "00:11:22:33:44:01", interface: 2 }   # Host-1

# RID 路由表 (Table 5)
rid_routes:
  - { space_id: 100, x: 12345, y: 34267, x_mask: 20, y_mask: 24, next_hop: [12360, 34280] }

# AID 路由表 (Table 6)
aid_routes:
  - { dst_aid: "cad3c29a3a629280e686cf8d969eef6e", next_hop: "8d969eef6ecad3c29a3a629280e686cf" }
  - { dst_aid: "969eef6ecad3c29a3a629280e686cf8d", next_hop: "8d969eef6ecad3c29a3a629280e686cf" }

# 本地映射表 (Table 7)
local_mappings:
  - { aid: "8d969eef6ecad3c29a3a629280e686cf", rid: [10001, 36191], space_id: 0 }      # AP-1
  - { aid: "cad3c29a3a629280e686cf8d969eef6e", rid: [10001, 36191], space_id: 100 }    # Host-1
  - { aid: "d3c29a3a629280e686cf8d969eef6eca", rid: [10003, 36193], space_id: 100 }    # TS

# 远端映射表 (Table 8) — CR-2 侧的设备
remote_mappings:
  - { aid: "969eef6ecad3c29a3a629280e686cf8d", mapped_rid: [10002, 36192], remote_cr: [12360, 34280], space_id: 100 }  # Host-2

# 关联 AP 列表 (Table 8 in doc)
associated_aps:
  - { aid: "8d969eef6ecad3c29a3a629280e686cf", rid: [10001, 36191], interface: 2 }

# 用户状态列表 (Table 9) — 初始为空, 用户上线后由 CS 动态更新
users: []
